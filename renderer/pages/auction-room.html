<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Subastas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:#fff;
  padding:24px;
}

.container{max-width:1400px;margin:auto}

.top{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr;
  gap:16px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:16px;
}

.muted{
  color:#94a3b8;
  font-size:14px;
}

.big{
  font-size:30px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.product{
  height:320px;
  background:#1e293b;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#94a3b8;
  margin-bottom:18px;
  overflow:hidden;
}

.product img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.list div{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #1e293b;
}

.auction-stats{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:14px;
  margin-top:20px;
}

.stat-box{
  background:#1e293b;
  padding:16px;
  border-radius:12px;
  text-align:center;
}

.label{
  display:block;
  font-size:13px;
  color:#94a3b8;
  margin-bottom:8px;
}

.value{
  font-size:20px;
  font-weight:bold;
}

.danger{color:#f87171}
.success{color:#10b981}

.quick-bids{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.bid-btn{
  flex:1;
  border:none;
  padding:12px;
  border-radius:10px;
  background:#10b981;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.custom-bid{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.custom-bid input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:#fff;
}

.primary-btn{
  border:none;
  padding:12px 18px;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
  font-weight:bold;
}

.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  z-index:10;
  background:#111827;
  color:#fff;
  border:none;
  padding:12px 14px;
  border-radius:12px;
  cursor:pointer;
  font-size:20px;
}
</style>
</head>

<body>

<button class="back-btn" onclick="goBack()">←</button>

<div class="container">

  <div class="top">
    <div class="card">
      <div class="muted">Sala</div>
      <div class="big" id="sessionTitle">LiveBid #01</div>
    </div>
  </div>

  <div class="grid">

    <div class="card">

      <div class="product">
        <img src="https://picsum.photos/600/300">
      </div>

      <h1 id="lotTitle">Reloj Vintage Edición Limitada</h1>
      <p class="muted">Lote #124 · Excelente estado · Certificado incluido</p>

      <section class="card" style="padding:20px;">

        <div class="auction-stats">

          <div class="stat-box">
            <span class="label">Tiempo restante</span>
            <span class="value danger" id="timer2">06:21</span>
          </div>

          <div class="stat-box">
            <span class="label">Puja actual</span>
            <span class="value" id="price2">420 €</span>
          </div>

          <div class="stat-box">
            <span class="label">Incremento mínimo</span>
            <span class="value" id="minIncrement">10 €</span>
          </div>

          <div class="stat-box">
            <span class="label">Ganando</span>
            <span class="value success" id="winner">Sin pujas</span>
          </div>

        </div>

        <div class="quick-bids">
          <button class="bid-btn" onclick="bidIncrement(10)">+10 €</button>
          <button class="bid-btn" onclick="bidIncrement(25)">+25 €</button>
          <button class="bid-btn" onclick="bidIncrement(50)">+50 €</button>
        </div>

        <button class="primary-btn" style="margin-top:15px;" onclick="closeCurrentLot()">Cerrar lote</button>

        <div class="custom-bid">
          <input type="text" id="customBid" placeholder="Introduce tu puja total" inputmode="numeric" autocomplete="off" oninput="this.value = this.value.replace(/[^0-9]/g, '')"/>
          <button class="primary-btn" onclick="customBid()">Pujar</button>
        </div>

      </section>

    </div>

    <div>

      <div class="card" style="margin-bottom:20px;">
        <h2>Próximo producto</h2>
        <br>
        <div class="product" style="height:140px;">Consola Retro</div>
        <p class="muted">Empieza cuando termine la actual</p>
      </div>

      <div class="card">
        <h2>Actividad</h2>
        <br>
        <div class="list" id="activity"></div>
      </div>

    </div>

  </div>

</div>

<script type="module">
import { applyEvent } from '../engine/reducer.js'
import { handleBidRequestEvents } from '../engine/bidFlow.js'
import { closeLotEvents } from '../engine/lotActions.js'

let time = 381

let state = {
  session: {
    id: 'session-1',
    title: 'LiveBid #01',
    hostId: 'host-1',
    status: 'live',
    createdAt: Date.now()
  },
  lots: [
    {
      id: 'lot-1',
      title: 'Reloj Vintage Edición Limitada',
      status: 'live',
      startingPrice: 420,
      currentPrice: 420,
      minIncrement: 10
    }
  ],
  participants: [
    {
      id: 'bidder-1',
      name: 'Tú',
      role: 'bidder',
      status: 'approved',
      createdAt: Date.now()
    }
  ],
  currentLotId: 'lot-1',
  officialEvents: []
}

function nextSequence(){
  return state.officialEvents.length + 1
}

function dispatch(event){
  state = applyEvent(state, event)
  addActivity(event)
  render()
}

function getCurrentLot(){
  return state.lots.find(lot => lot.id === state.currentLotId)
}

function render(){
  const lot = getCurrentLot()
  if(!lot) return

  document.getElementById('sessionTitle').innerText = state.session.title
  document.getElementById('lotTitle').innerText = lot.title
  document.getElementById('price2').innerText = lot.currentPrice + ' €'
  document.getElementById('minIncrement').innerText = lot.minIncrement + ' €'

  if(lot.currentBidderId){
    const bidder = state.participants.find(p => p.id === lot.currentBidderId)
    document.getElementById('winner').innerText = bidder?.name ?? lot.currentBidderId
  }else{
    document.getElementById('winner').innerText = 'Sin pujas'
  }
}

function addActivity(event){
  const activity = document.getElementById('activity')
  const row = document.createElement('div')

  const name =
    event.payload?.bidderId === 'bidder-1'
      ? 'Tú'
      : event.payload?.bidderId || ''

  if(event.type === 'BID_REQUESTED'){
    return
  }

  if(event.type === 'BID_ACCEPTED'){
    row.innerHTML = `<span>${name}</span><span>${event.payload.amount} €</span>`
  }

  if(event.type === 'BID_REJECTED'){
    row.innerHTML = `<span>Error</span><span>${event.payload.reason}</span>`
    alert(event.payload.reason)
  }

  if(row.innerHTML){
    activity.prepend(row)
  }
}

window.bidIncrement = function(increment){
  const lot = getCurrentLot()
  if(!lot) return

  const bidRequest = {
    type: 'BID_REQUEST',
    sessionId: state.session.id,
    lotId: lot.id,
    amount: lot.currentPrice + increment,
    bidderId: 'bidder-1',
    createdAt: Date.now()
  }

  const events = handleBidRequestEvents(state, bidRequest, nextSequence())

  for(const event of events){
    dispatch(event)
  }
}

window.customBid = function(){
  const lot = getCurrentLot()
  if(!lot) return

  const input = document.getElementById('customBid')
  const amount = Number(input.value)

  if(Number.isFinite(amount) && amount > 0){
    const bidRequest = {
      type: 'BID_REQUEST',
      sessionId: state.session.id,
      lotId: lot.id,
      amount,
      bidderId: 'bidder-1',
      createdAt: Date.now()
    }

    const events = handleBidRequestEvents(state, bidRequest, nextSequence())

    for(const event of events){
      dispatch(event)
    }

    input.value = ''
    input.blur()
    setTimeout(() => input.focus(), 0)
  }
}

window.closeCurrentLot = function(){
  const lot = getCurrentLot()
  if(!lot) return

  const events = closeLotEvents(state, lot.id, {
    sessionId: state.session.id,
    sequence: nextSequence()
  })

  for(const event of events){
    dispatch(event)
  }

  alert('Lote cerrado')
}

window.goBack = function(){
  window.location.href = './../index.html'
}

setInterval(() => {
  if(time > 0){
    time--

    const m = Math.floor(time / 60).toString().padStart(2, '0')
    const s = (time % 60).toString().padStart(2, '0')

    document.getElementById('timer2').innerText = m + ':' + s
  }else{
    document.getElementById('timer2').innerText = 'FINALIZADA'
  }
}, 1000)

render()
</script>

</body>
</html>
